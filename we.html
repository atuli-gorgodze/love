<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ჩვენ - ჩვენი სახლი</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="we-header">
        <a href="anniversary.html" class="back-link">⟵ უკან დაბრუნება</a>
        <h1 class="we-title">ჩვენ</h1>
    </header>

    <main>
        <section class="heart-stage">
            <div class="heart-grid">
                <div class="heart-spacer"></div>
                <div class="heart-item"><img src="assets/photo7.jpg"></div>
                <div class="heart-spacer"></div>
                <div class="heart-item"><img src="assets/photo8.jpg"></div>
                <div class="heart-spacer"></div>

                <div class="heart-item"><img src="assets/photo9.jpg"></div>
                <div class="heart-spacer"></div>
                <div class="heart-item"><img src="assets/photo10.jpg"></div>
                <div class="heart-spacer"></div>
                <div class="heart-item"><img src="assets/photo11.jpg"></div>

                <div class="heart-spacer"></div>
                <div class="heart-item"><img src="assets/photo1.jpg"></div>
                <div class="heart-spacer"></div>
                <div class="heart-item"><img src="assets/photo2.jpg"></div>
                <div class="heart-spacer"></div>
            </div>
        </section>

        <!-- 🎵 MUSIC (UNCHANGED) -->
        <audio id="music-player" playsinline preload="auto">
            <source src="assets/music.mp3" type="audio/mpeg">
        </audio>

        <!-- VIDEOS -->
        <section class="video-section">
            <h2>ჩვენი მოგონებები ვიდეოებში</h2>

            <div class="video-gallery">
                <div class="video-item">
                    <video autoplay muted loop playsinline class="video-card">
                        <source src="assets/video.mp4" type="video/mp4">
                        <source src="assets/video.webm" type="video/webm">
                    </video>
                </div>

                <div class="video-item">
                    <video autoplay muted loop playsinline class="video-card">
                        <source src="assets/video2.mp4" type="video/mp4">
                        <source src="assets/video2.webm" type="video/webm">
                    </video>
                </div>

                <div class="video-item">
                    <video autoplay muted loop playsinline class="video-card">
                        <source src="assets/video3.mp4" type="video/mp4">
                        <source src="assets/video3.webm" type="video/webm">
                    </video>
                </div>

                <div class="video-item">
                    <video autoplay muted loop playsinline class="video-card">
                        <source src="assets/video4.mp4" type="video/mp4">
                        <source src="assets/video4.webm" type="video/webm">
                    </video>
                </div>
            </div>
        </section>

        <!-- ❤️ ENVELOPE -->
        <section class="envelope-section">
            <h2>მიყვარხარ!❤️</h2>
            <div class="envelope-container">
                <div class="envelope" id="envelope">
                    <div class="envelope-flap"></div>
                    <div class="envelope-body">
                        <div class="letter" id="letter">
                            <div class="letter-content">
                                <h3>ჩემო ცხოვრება</h3>
                                <p>
                                                                   შენ ხარ ჩემი ყველაზე დიდი ბედნიერება.
                                ყოველი წამი შენთან არის საჩუქარი. მიყვარხარ უფრო ვიდრე სიტყვებით შეიძლება გადმოცემა.❤️
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <!-- ✅ ONLY FIX: iPhone-safe music start -->
    <script>
    window.addEventListener('DOMContentLoaded', () => {
        const player = document.getElementById('music-player');
        const params = new URLSearchParams(window.location.search);

        if (params.get('play') === '1') {

            const startMusic = () => {
                player.play().catch(() => {});
            };

            // iPhone + Android + PC safe triggers
            document.addEventListener('click', startMusic, { once: true });
            document.addEventListener('touchstart', startMusic, { once: true });
        }

        const envelope = document.getElementById('envelope');
        if (envelope) {
            envelope.addEventListener('click', () => {
                envelope.classList.toggle('open');
            });
        }
    });
    </script>

    <script src="script.js"></script>
</body>
</html>
